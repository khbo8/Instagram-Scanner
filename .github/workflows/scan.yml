name: Instagram Scanner

on:
  workflow_dispatch:    # شغّل يدوي
  schedule:
    - cron: '0 */2 * * *'   # كل ساعتين

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 📦 Install dependencies
      run: |
        pip install requests
    
    - name: 🚀 Run Instagram Scanner (100 accounts)
      id: scan
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python insta_scanner.py
    
    - name: 📤 Upload found accounts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: found-accounts
        path: found_accounts.json
        if-no-files-found: warn
